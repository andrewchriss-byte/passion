<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 F1 Race Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Titillium+Web:wght@400;700&display=swap');

        :root {
            --bg-dark: #0f0f12;
            --panel-bg: rgba(25, 25, 30, 0.9);
            --f1-red: #e10600;
            --text-main: #f4f4f4;
            --text-muted: #888;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Titillium Web', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        h1 {
            font-family: 'Racing Sans One', sans-serif;
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
        }
        h1 span { color: var(--f1-red); }

        .dashboard {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        /* Schedule Panel */
        .schedule-panel {
            width: 300px;
            background: var(--panel-bg);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: var(--f1-red);
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .schedule-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .schedule-list::-webkit-scrollbar { width: 6px; }
        .schedule-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .race-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .race-item:hover, .race-item.active { background: rgba(225, 6, 0, 0.2); }
        .race-rnd { font-size: 0.8rem; color: var(--f1-red); font-weight: bold; }
        .race-name { font-size: 1.1rem; font-weight: bold; }
        .race-loc { font-size: 0.9rem; color: var(--text-muted); }

        /* Track Visualizer */
        .visualizer-panel {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        svg {
            width: 80%;
            height: 80%;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .track-path {
            fill: none;
            stroke: #333;
            stroke-width: 15;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .track-centerline {
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-dasharray: 5, 5;
        }

        .car {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px currentColor;
            transition: box-shadow 0.2s;
            z-index: 10;
        }

        #track-info {
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>F1 <span>2026</span> Tracker</h1>
    </header>

    <div class="dashboard">
        <div class="schedule-panel">
            <div class="panel-header">2026 Calendar</div>
            <div class="schedule-list" id="schedule-list">
                </div>
        </div>

        <div class="visualizer-panel">
            <div id="track-info">
                <h2 id="current-track-name" style="margin: 0; color: var(--f1-red);">Select a Race</h2>
                <p id="current-track-loc" style="margin: 5px 0 0 0; color: var(--text-muted);">---</p>
            </div>
            
            <svg viewBox="0 0 800 600" id="track-svg">
                <path id="main-track" class="track-path" d="M 200 150 C 400 100, 600 150, 650 300 C 700 450, 500 500, 400 450 C 300 400, 200 500, 150 400 C 100 300, 50 200, 200 150 Z" />
                <path id="center-line" class="track-centerline" d="M 200 150 C 400 100, 600 150, 650 300 C 700 450, 500 500, 400 450 C 300 400, 200 500, 150 400 C 100 300, 50 200, 200 150 Z" />
            </svg>
            
            <div id="cars-container"></div>
        </div>
    </div>

    <script>
        // Representative 2026 Schedule
        const schedule2026 = [
            { rnd: 1, name: "Bahrain Grand Prix", loc: "Sakhir, Bahrain", layout: "classic" },
            { rnd: 2, name: "Saudi Arabian Grand Prix", loc: "Jeddah, Saudi Arabia", layout: "street" },
            { rnd: 3, name: "Australian Grand Prix", loc: "Melbourne, Australia", layout: "street" },
            { rnd: 4, name: "Japanese Grand Prix", loc: "Suzuka, Japan", layout: "classic" },
            { rnd: 5, name: "Chinese Grand Prix", loc: "Shanghai, China", layout: "classic" },
            { rnd: 6, name: "Miami Grand Prix", loc: "Miami, USA", layout: "street" },
            { rnd: 7, name: "Emilia Romagna Grand Prix", loc: "Imola, Italy", layout: "classic" },
            { rnd: 8, name: "Monaco Grand Prix", loc: "Monte Carlo, Monaco", layout: "street" },
            { rnd: 9, name: "Spanish Grand Prix", loc: "Madrid, Spain (NEW)", layout: "street" },
            { rnd: 10, name: "Canadian Grand Prix", loc: "Montreal, Canada", layout: "classic" },
            { rnd: 11, name: "Austrian Grand Prix", loc: "Spielberg, Austria", layout: "speed" },
            { rnd: 12, name: "British Grand Prix", loc: "Silverstone, UK", layout: "classic" },
            { rnd: 13, name: "Belgian Grand Prix", loc: "Spa-Francorchamps, Belgium", layout: "classic" },
            { rnd: 14, name: "Hungarian Grand Prix", loc: "Budapest, Hungary", layout: "classic" },
            { rnd: 15, name: "Dutch Grand Prix", loc: "Zandvoort, Netherlands", layout: "classic" },
            { rnd: 16, name: "Italian Grand Prix", loc: "Monza, Italy", layout: "speed" },
            { rnd: 17, name: "Azerbaijan Grand Prix", loc: "Baku, Azerbaijan", layout: "street" },
            { rnd: 18, name: "Singapore Grand Prix", loc: "Marina Bay, Singapore", layout: "street" },
            { rnd: 19, name: "United States Grand Prix", loc: "Austin, USA", layout: "classic" },
            { rnd: 20, name: "Mexico City Grand Prix", loc: "Mexico City, Mexico", layout: "classic" },
            { rnd: 21, name: "São Paulo Grand Prix", loc: "Interlagos, Brazil", layout: "classic" },
            { rnd: 22, name: "Las Vegas Grand Prix", loc: "Las Vegas, USA", layout: "speed" },
            { rnd: 23, name: "Qatar Grand Prix", loc: "Lusail, Qatar", layout: "classic" },
            { rnd: 24, name: "Abu Dhabi Grand Prix", loc: "Yas Marina, UAE", layout: "classic" }
        ];

        // Simplified SVG Path strings for different track types
        const trackLayouts = {
            classic: "M 200 150 C 400 100, 600 150, 650 300 C 700 450, 500 500, 400 450 C 300 400, 200 500, 150 400 C 100 300, 50 200, 200 150 Z",
            street: "M 150 150 L 650 150 L 650 300 L 450 300 L 450 450 L 150 450 Z",
            speed: "M 200 200 Q 400 50 600 200 Q 750 350 600 400 Q 400 500 200 400 Q 50 250 200 200 Z"
        };

        const teams = [
            { name: 'Red Bull', color: '#3671C6', speed: 2.5 },
            { name: 'Ferrari', color: '#E8002D', speed: 2.45 },
            { name: 'McLaren', color: '#FF8000', speed: 2.4 },
            { name: 'Mercedes', color: '#27F4D2', speed: 2.35 },
            { name: 'Aston Martin', color: '#229971', speed: 2.2 }
        ];

        let cars = [];
        let animationId;

        function initSchedule() {
            const list = document.getElementById('schedule-list');
            schedule2026.forEach((race, index) => {
                const el = document.createElement('div');
                el.className = 'race-item';
                el.innerHTML = `
                    <div class="race-rnd">ROUND ${race.rnd}</div>
                    <div class="race-name">${race.name}</div>
                    <div class="race-loc">${race.loc}</div>
                `;
                el.onclick = () => loadTrack(race, el);
                list.appendChild(el);
            });
            
            // Load first race by default
            loadTrack(schedule2026[0], list.firstChild);
        }

        function loadTrack(race, element) {
            // Update UI
            document.querySelectorAll('.race-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            document.getElementById('current-track-name').innerText = race.name;
            document.getElementById('current-track-loc').innerText = race.loc;

            // Change SVG Path
            const newPath = trackLayouts[race.layout];
            document.getElementById('main-track').setAttribute('d', newPath);
            document.getElementById('center-line').setAttribute('d', newPath);

            spawnCars();
        }

        function spawnCars() {
            const container = document.getElementById('cars-container');
            container.innerHTML = '';
            cars = [];

            const svg = document.getElementById('track-svg');
            const path = document.getElementById('center-line');
            const pathLength = path.getTotalLength();

            teams.forEach((team, index) => {
                const carEl = document.createElement('div');
                carEl.className = 'car';
                carEl.style.backgroundColor = team.color;
                carEl.style.color = team.color; // for box-shadow
                container.appendChild(carEl);

                cars.push({
                    el: carEl,
                    distance: index * -50, // Stagger starting positions
                    speed: team.speed + (Math.random() * 0.2), // Slight speed variance
                    path: path,
                    pathLength: pathLength,
                    svg: svg
                });
            });

            if(!animationId) animateCars();
        }

        function animateCars() {
            cars.forEach(car => {
                car.distance += car.speed;
                
                // Loop around the track
                if (car.distance >= car.pathLength) {
                    car.distance = 0;
                }

                // If distance is negative (staggered start), keep them at start line temporarily
                let renderDist = car.distance < 0 ? 0 : car.distance;

                // Get SVG coordinates
                const point = car.path.getPointAtLength(renderDist);
                
                // Convert SVG coordinates to screen coordinates
                const svgRect = car.svg.getBoundingClientRect();
                const viewBox = car.svg.viewBox.baseVal;
                
                const scaleX = svgRect.width / viewBox.width;
                const scaleY = svgRect.height / viewBox.height;

                const screenX = svgRect.left + (point.x * scaleX);
                const screenY = svgRect.top + (point.y * scaleY);

                car.el.style.left = `${screenX}px`;
                car.el.style.top = `${screenY}px`;
            });

            animationId = requestAnimationFrame(animateCars);
        }

        // Handle window resize to keep cars on track
        window.addEventListener('resize', () => {
            if(cars.length > 0) spawnCars();
        });

        // Start
        window.onload = initSchedule;
    </script>
</body>
</html>

        // Initialize board on load
        window.onload = generateBaseBoard;
    </script>
</body>
</html>
